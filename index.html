<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saltmarsh — Town Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1208;
    --ink-mid:   #3d2e18;
    --ink-light: #7a6045;
    --parchment: #f5ead6;
    --parchment-dark: #e8d5b5;
    --parchment-deep: #d4b98a;
    --sea:       #1e3d4f;
    --sea-mid:   #2e5f78;
    --sea-light: #4a8fa8;
    --sea-pale:  #d4eaf2;
    --gold:      #c4860a;
    --gold-light:#f0c060;
    --red:       #8b2020;

    --cat-tavern:   #3d1a08;
    --cat-civic:    #1a2a1a;
    --cat-trade:    #0a1e30;
    --cat-docks:    #1e1a08;
    --cat-landmark: #1a0a2e;

    --cat-tavern-bg:   #f5e6d8;
    --cat-civic-bg:    #ddeedd;
    --cat-trade-bg:    #d8e8f5;
    --cat-docks-bg:    #f5f0d8;
    --cat-landmark-bg: #ead8f5;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background-color: #0d1c26;
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(30,61,79,0.8) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(20,40,55,0.6) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wave-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.04;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 20px,
      rgba(74,143,168,0.5) 20px,
      rgba(74,143,168,0.5) 21px
    );
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 4rem 2rem 3rem;
    border-bottom: 1px solid rgba(196,134,10,0.3);
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .ornament-line {
    flex: 1;
    max-width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .anchor-icon {
    font-size: 1.5rem;
    color: var(--gold);
    opacity: 0.8;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(196,134,10,0.4), 0 2px 4px rgba(0,0,0,0.6);
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--parchment-deep);
    margin-top: 0.75rem;
    letter-spacing: 0.03em;
  }

  .town-desc {
    max-width: 560px;
    margin: 1.5rem auto 0;
    font-size: 1rem;
    color: rgba(245,234,214,0.7);
    line-height: 1.8;
    font-style: italic;
  }

  /* ── Controls ── */
  .controls {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 2.5rem auto 0;
    padding: 0 2rem;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    font-size: 1rem;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.75rem;
    background: rgba(245,234,214,0.92);
    border: 1px solid var(--parchment-deep);
    border-radius: 4px;
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    color: var(--ink);
    outline: none;
    transition: box-shadow 0.2s;
  }

  #search::placeholder { color: var(--ink-light); font-style: italic; }
  #search:focus { box-shadow: 0 0 0 2px rgba(196,134,10,0.5); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .filter-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid rgba(196,134,10,0.4);
    background: transparent;
    color: var(--parchment-deep);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    background: rgba(196,134,10,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .filter-btn.active {
    background: rgba(196,134,10,0.25);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .results-count {
    font-size: 0.85rem;
    font-style: italic;
    color: rgba(245,234,214,0.4);
    margin-bottom: 1.5rem;
  }

  /* ── Grid ── */
  .grid {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* ── Cards ── */
  .card {
    background: rgba(245,234,214,0.06);
    border: 1px solid rgba(196,134,10,0.2);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: rgba(196,134,10,0.5);
    background: rgba(245,234,214,0.09);
    transform: translateY(-2px);
  }

  .card.expanded {
    border-color: rgba(196,134,10,0.6);
    background: rgba(245,234,214,0.1);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 1rem 1.25rem;
  }

  .num {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: 600;
    min-width: 28px;
    height: 28px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1px solid;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1.3;
    letter-spacing: 0.03em;
  }

  .card-meta {
    font-size: 0.85rem;
    color: rgba(245,234,214,0.5);
    font-style: italic;
    margin-top: 3px;
    line-height: 1.4;
  }

  .cat-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 2px;
    margin-top: 6px;
    display: inline-block;
    border: 1px solid;
    text-transform: uppercase;
  }

  .chevron {
    margin-left: auto;
    color: rgba(245,234,214,0.3);
    font-size: 0.8rem;
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .card.expanded .chevron { transform: rotate(180deg); }

  /* ── Card body ── */
  .card-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid rgba(196,134,10,0.15);
  }

  .card.expanded .card-body { display: block; }

  .card-desc {
    font-size: 0.975rem;
    line-height: 1.75;
    color: rgba(245,234,214,0.8);
    padding-top: 0.875rem;
  }

  .npcs-section {
    margin-top: 0.875rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(196,134,10,0.12);
  }

  .npcs-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .npc-chip {
    display: inline-block;
    font-size: 0.82rem;
    padding: 2px 10px;
    margin: 2px 3px 2px 0;
    background: rgba(196,134,10,0.12);
    border: 1px solid rgba(196,134,10,0.3);
    border-radius: 2px;
    color: var(--parchment-deep);
    font-style: italic;
  }

  /* ── Notes (session content from Discord) ── */
  .notes-section {
    margin-top: 0.875rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(196,134,10,0.12);
  }

  .notes-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: #8ab4c8;
    opacity: 0.9;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .notes-text {
    font-size: 0.93rem;
    line-height: 1.78;
    color: rgba(212,234,242,0.82);
    white-space: pre-line;
  }

  /* ── Tags ── */
  .tags-row {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag-chip {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 2px;
    background: rgba(138,180,200,0.15);
    border: 1px solid rgba(138,180,200,0.3);
    color: #8ab4c8;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Category colors ── */
  .cat-tavern   { color: #e8a060; border-color: rgba(232,160,96,0.4); background: rgba(232,160,96,0.1); }
  .cat-civic    { color: #90c890; border-color: rgba(144,200,144,0.4); background: rgba(144,200,144,0.1); }
  .cat-trade    { color: #7ab4e0; border-color: rgba(122,180,224,0.4); background: rgba(122,180,224,0.1); }
  .cat-docks    { color: #e8d060; border-color: rgba(232,208,96,0.4);  background: rgba(232,208,96,0.1); }
  .cat-landmark { color: #c090e0; border-color: rgba(192,144,224,0.4); background: rgba(192,144,224,0.1); }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    border-top: 1px solid rgba(196,134,10,0.2);
    font-size: 0.8rem;
    font-style: italic;
    color: rgba(245,234,214,0.25);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 2.5rem 1.25rem 2rem; }
    .controls, .grid { padding-left: 1.25rem; padding-right: 1.25rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wave-bg"></div>

<header>
  <div class="header-ornament">
    <div class="ornament-line"></div>
    <span class="anchor-icon">⚓</span>
    <div class="ornament-line"></div>
  </div>
  <h1 id="town-name">Saltmarsh</h1>
  <p class="subtitle" id="town-subtitle">A coastal town on the Azure Sea</p>
  <p class="town-desc" id="town-desc"></p>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search locations, NPCs, session notes…" oninput="render()" />
  </div>
  <div class="filters" id="filters"></div>
  <div class="results-count" id="count"></div>
</div>

<div class="grid" id="grid"></div>

<footer>
  <p>Saltmarsh · Azure Sea · Updated from session notes</p>
</footer>

<script>
const CATEGORIES = [
  { id: 'all',      label: 'All Locations' },
  { id: 'tavern',   label: 'Taverns & Inns' },
  { id: 'civic',    label: 'Civic' },
  { id: 'trade',    label: 'Trade & Guilds' },
  { id: 'docks',    label: 'Docks & Harbor' },
  { id: 'landmark', label: 'Landmarks' },
];

const CAT_LABELS = {
  tavern: 'Tavern & Inn', civic: 'Civic', trade: 'Trade & Guild',
  docks: 'Docks', landmark: 'Landmark'
};

let data = null;
let activeFilter = 'all';

async function init() {
  try {
    const res = await fetch('data.json?v=' + Date.now());
    data = await res.json();
  } catch (e) {
    document.getElementById('grid').innerHTML = '<p style="color:rgba(245,234,214,0.5);padding:2rem;font-style:italic">Could not load data.json. Make sure it is in the same folder as index.html.</p>';
    return;
  }

  document.getElementById('town-name').textContent = data.town.name;
  document.getElementById('town-subtitle').textContent = data.town.subtitle;
  document.getElementById('town-desc').textContent = data.town.description;
  document.title = data.town.name + ' — Town Guide';

  buildFilters();
  render();
}

function buildFilters() {
  const wrap = document.getElementById('filters');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat.id === 'all' ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => {
      activeFilter = cat.id;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    wrap.appendChild(btn);
  });
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let shown = 0;

  data.locations.forEach((loc, i) => {
    const matchFilter = activeFilter === 'all' || loc.category === activeFilter;
    const searchStr = [loc.name, loc.meta, loc.description, loc.notes, ...loc.npcs, ...(loc.tags || [])].join(' ').toLowerCase();
    const matchSearch = !q || searchStr.includes(q);
    if (!matchFilter || !matchSearch) return;
    shown++;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (shown * 0.04) + 's';

    const hasNpcs = loc.npcs && loc.npcs.length > 0;
    const hasNotes = loc.notes && loc.notes.trim().length > 0;
    const hasTags = loc.tags && loc.tags.length > 0;

    card.innerHTML = `
      <div class="card-top">
        <div class="num cat-${loc.category}">${loc.id}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${loc.name}</div>
          <div class="card-meta">${loc.meta}</div>
          <span class="cat-tag cat-${loc.category}">${CAT_LABELS[loc.category] || loc.category}</span>
          ${hasTags ? `<div class="tags-row">${loc.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}</div>` : ''}
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body">
        <p class="card-desc">${loc.description}</p>
        ${hasNpcs ? `
          <div class="npcs-section">
            <div class="npcs-label">Notable People</div>
            ${loc.npcs.map(n => `<span class="npc-chip">${n}</span>`).join('')}
          </div>` : ''}
        ${hasNotes ? `
          <div class="notes-section">
            <div class="notes-label">Session Notes</div>
            <div class="notes-text">${loc.notes}</div>
          </div>` : ''}
      </div>`;

    card.querySelector('.card-top').onclick = () => card.classList.toggle('expanded');
    grid.appendChild(card);
  });

  document.getElementById('count').textContent =
    shown === data.locations.length
      ? `${shown} locations`
      : `${shown} of ${data.locations.length} locations`;
}

init();
</script>
</body>
</html>
