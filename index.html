<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saltmarsh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1920;--surface:rgba(245,234,214,0.045);--surface-hover:rgba(245,234,214,0.08);
  --border:rgba(196,134,10,0.16);--border-hover:rgba(196,134,10,0.4);
  --parchment:#f5ead6;--parch-mid:#d4b98a;--parch-dim:rgba(245,234,214,0.45);
  --gold:#c4860a;--gold-light:#f0c060;--gold-dim:rgba(196,134,10,0.7);
  --blue:#6aadca;--blue-dim:rgba(138,180,200,0.65);
  --green:#78b860;--red:#c05050;
  --radius:4px;
  --serif:'Crimson Pro',Georgia,serif;--display:'Cinzel',serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--serif);background:var(--bg);color:var(--parchment);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(30,61,79,0.7) 0%,transparent 70%);pointer-events:none;z-index:0}
a{color:var(--blue);text-decoration:none}a:hover{color:var(--gold-light)}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(12,25,32,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 2rem}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:52px}
.nav-brand{font-family:var(--display);font-size:1rem;letter-spacing:0.1em;color:var(--gold-light);cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{font-family:var(--display);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--parch-dim);padding:6px 12px;border-radius:2px;cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:all 0.2s}
.nav-link:hover{color:var(--parchment);background:rgba(245,234,214,0.05)}
.nav-link.active{color:var(--gold-light);border-color:var(--border-hover);background:rgba(196,134,10,0.1)}
.nav-count{font-family:var(--serif);font-size:0.65rem;color:var(--parch-dim);margin-left:4px;font-style:italic;opacity:0.6}

/* ── PAGE SHELL ── */
.page{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:2.5rem 2rem 5rem;display:none;animation:fadeIn 0.25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.page-title{font-family:var(--display);font-size:clamp(1.5rem,4vw,2.2rem);font-weight:600;color:var(--gold-light);letter-spacing:0.05em;margin-bottom:0.4rem}
.page-sub{font-size:1rem;font-style:italic;color:var(--parch-dim);margin-bottom:2rem}

/* ── SECTION LABEL ── */
.label{font-family:var(--display);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding-bottom:0.5rem;border-bottom:1px solid var(--border);margin-bottom:0.85rem}
.label-gold{color:var(--gold-dim)}.label-blue{color:var(--blue-dim)}

/* ── CARDS (shared) ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;animation:fadeIn 0.35s ease both}
.card:hover{border-color:var(--border-hover);background:var(--surface-hover);transform:translateY(-1px)}
.card-inner{display:flex;align-items:flex-start;gap:12px;padding:0.9rem 1.1rem}

.badge{font-family:var(--display);font-size:0.7rem;font-weight:600;min-width:28px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid;margin-top:2px}
.card-title{font-family:var(--display);font-size:0.9rem;font-weight:600;color:var(--gold-light);letter-spacing:0.02em;line-height:1.3}
.card-meta{font-size:0.82rem;color:var(--parch-dim);font-style:italic;margin-top:2px}
.card-arrow{margin-left:auto;color:rgba(245,234,214,0.15);flex-shrink:0;margin-top:4px;transition:all 0.2s}
.card:hover .card-arrow{color:var(--gold);transform:translateX(3px)}

.cat-tag{font-family:var(--display);font-size:0.55rem;letter-spacing:0.1em;padding:2px 7px;border-radius:2px;margin-top:5px;display:inline-block;border:1px solid;text-transform:uppercase}
.tag-chip{background:rgba(138,180,200,0.1);border:1px solid rgba(138,180,200,0.25);color:var(--blue);font-family:var(--display);font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
.has-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin-left:6px;vertical-align:middle;opacity:0.65}
.tags-row{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}

/* cat colors */
.cat-tavern{color:#e0a060;border-color:rgba(224,160,96,0.35);background:rgba(224,160,96,0.08)}
.cat-civic{color:#88c488;border-color:rgba(136,196,136,0.35);background:rgba(136,196,136,0.08)}
.cat-trade{color:#70b0d8;border-color:rgba(112,176,216,0.35);background:rgba(112,176,216,0.08)}
.cat-docks{color:#d8c860;border-color:rgba(216,200,96,0.35);background:rgba(216,200,96,0.08)}
.cat-landmark{color:#b888d8;border-color:rgba(184,136,216,0.35);background:rgba(184,136,216,0.08)}

/* ── FILTERS ── */
.search-bar{position:relative;margin-bottom:1.25rem}
.search-bar input{width:100%;padding:0.65rem 1rem 0.65rem 2.5rem;background:rgba(245,234,214,0.9);border:1px solid var(--parch-mid);border-radius:var(--radius);font-family:var(--serif);font-size:1rem;color:#1a1208;outline:none}
.search-bar input::placeholder{color:rgba(122,96,69,0.7);font-style:italic}
.search-bar input:focus{box-shadow:0 0 0 2px rgba(196,134,10,0.4)}
.search-bar::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(122,96,69,0.6);font-size:1rem;pointer-events:none}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.filter-btn{font-family:var(--display);font-size:0.62rem;letter-spacing:0.08em;padding:4px 12px;border-radius:2px;border:1px solid rgba(196,134,10,0.3);background:transparent;color:var(--parch-mid);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{background:rgba(196,134,10,0.12);color:var(--gold-light)}
.filter-btn.active{background:rgba(196,134,10,0.2);border-color:var(--gold);color:var(--gold-light)}
.result-count{font-size:0.8rem;font-style:italic;color:rgba(245,234,214,0.3);margin-bottom:1.5rem}

/* ── DETAIL (shared detail page) ── */
.detail-back{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.back-btn{font-family:var(--display);font-size:0.68rem;letter-spacing:0.1em;color:var(--parch-mid);border:1px solid rgba(196,134,10,0.3);background:transparent;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all 0.2s}
.back-btn:hover{background:rgba(196,134,10,0.12);color:var(--gold-light)}
.pn-row{display:flex;gap:6px}
.pn-btn{font-family:var(--display);font-size:0.62rem;letter-spacing:0.08em;color:rgba(245,234,214,0.3);border:1px solid rgba(196,134,10,0.15);background:transparent;padding:5px 10px;border-radius:2px;cursor:pointer;transition:all 0.2s}
.pn-btn:hover{color:var(--gold-light);border-color:var(--border-hover)}
.pn-btn.off{opacity:0.2;pointer-events:none}

.detail-hero{display:flex;align-items:flex-start;gap:1.2rem;margin-bottom:2rem;padding-bottom:1.75rem;border-bottom:1px solid var(--border)}
.detail-badge{font-family:var(--display);font-size:1rem;font-weight:600;width:44px;height:44px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid}
.detail-title{font-family:var(--display);font-size:clamp(1.4rem,3.5vw,2rem);font-weight:600;color:var(--gold-light);letter-spacing:0.04em;line-height:1.2}
.detail-meta{font-size:0.95rem;color:var(--parch-dim);font-style:italic;margin-top:5px}

.dsection{margin-bottom:2rem}
.dsection .label{margin-bottom:0.75rem}
.desc-text{font-size:1.08rem;line-height:1.85;color:rgba(245,234,214,0.85)}
.npc-tag{display:inline-block;font-size:0.92rem;padding:3px 12px;margin:2px 3px 2px 0;background:rgba(196,134,10,0.08);border:1px solid rgba(196,134,10,0.25);border-radius:2px;color:var(--parch-mid);font-style:italic}

/* ── NOTES PARSER ── */
.notes{font-size:1rem;line-height:1.85;color:rgba(212,234,242,0.78)}
.notes .nh{display:block;font-family:var(--display);font-size:0.63rem;letter-spacing:0.15em;color:var(--blue-dim);text-transform:uppercase;margin:1.6rem 0 0.6rem;padding-bottom:0.35rem;border-bottom:1px solid rgba(138,180,200,0.12)}
.notes .nh:first-child{margin-top:0}
.notes p{margin-bottom:0.7rem}
.notes .pr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(196,134,10,0.06);gap:1rem;font-size:0.95rem}
.notes .pr:last-child{border-bottom:none}
.notes .prn{color:rgba(245,234,214,0.78)}.notes .prv{color:var(--gold-light);font-family:var(--display);font-size:0.82rem;white-space:nowrap}
.notes .ni{padding-left:1.1rem;position:relative;margin-bottom:0.3rem;color:rgba(212,234,242,0.68);font-size:0.95rem}
.notes .ni::before{content:'·';position:absolute;left:0;color:rgba(138,180,200,0.4)}

/* ── STORY CHAPTER LIST ── */
.chapter-list{display:flex;flex-direction:column;gap:8px}
.chapter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;transition:all 0.2s}
.chapter-card.has-content{cursor:pointer}
.chapter-card.has-content:hover{border-color:var(--border-hover);background:var(--surface-hover)}
.chapter-card.empty{opacity:0.45}
.ch-num{font-family:var(--display);font-size:0.65rem;letter-spacing:0.1em;color:var(--parch-dim);min-width:40px}
.ch-title{font-family:var(--display);font-size:0.88rem;color:var(--gold-light);letter-spacing:0.03em}
.chapter-card.empty .ch-title{color:var(--parch-dim)}
.ch-arrow{margin-left:auto;color:rgba(245,234,214,0.15);transition:all 0.2s}
.chapter-card.has-content:hover .ch-arrow{color:var(--gold);transform:translateX(3px)}

/* ── STORY READING ── */
.reading{max-width:680px;margin:0 auto}
.reading-title{font-family:var(--display);font-size:clamp(1.4rem,3.5vw,2rem);font-weight:600;color:var(--gold-light);text-align:center;margin-bottom:0.5rem}
.reading-body{font-size:1.12rem;line-height:2;color:rgba(245,234,214,0.88);white-space:pre-line}

/* ── QUEST TRACKER ── */
.quest-section{margin-bottom:2.5rem}
.quest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:8px}
.quest-title{font-family:var(--display);font-size:0.88rem;color:var(--gold-light);letter-spacing:0.02em}
.quest-status{font-family:var(--display);font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-left:8px}
.status-active{color:var(--green);border:1px solid rgba(120,184,96,0.3);background:rgba(120,184,96,0.1)}
.status-complete{color:var(--parch-dim);border:1px solid rgba(180,170,150,0.2);background:rgba(180,170,150,0.05)}
.quest-body{font-size:0.95rem;line-height:1.7;color:rgba(245,234,214,0.7);margin-top:0.5rem;white-space:pre-line}

/* ── PARTY ── */
.party-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;text-align:center;transition:all 0.2s}
.pc-card.has-content{cursor:pointer}.pc-card.has-content:hover{border-color:var(--border-hover);background:var(--surface-hover)}
.pc-card.empty{opacity:0.4}
.pc-initial{font-family:var(--display);width:48px;height:48px;border-radius:50%;background:rgba(196,134,10,0.1);border:1px solid rgba(196,134,10,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem;font-size:1rem;color:var(--gold-light)}
.pc-name{font-family:var(--display);font-size:0.95rem;color:var(--gold-light);letter-spacing:0.04em}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--parch-dim);font-style:italic;font-size:0.95rem;opacity:0.6}

/* ── FOOTER ── */
footer{position:relative;z-index:10;text-align:center;padding:2rem;border-top:1px solid var(--border);font-size:0.75rem;font-style:italic;color:rgba(245,234,214,0.18)}

@media(max-width:640px){
  nav{padding:0 1rem}.nav-inner{gap:1rem}
  .page{padding:2rem 1.25rem 4rem}
  .card-grid{grid-template-columns:1fr}
  .detail-hero{flex-direction:column;gap:0.75rem}
  .party-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-brand" onclick="go('')">⚓ <span id="nav-name">Saltmarsh</span></div>
    <div class="nav-links" id="nav-links"></div>
  </div>
</nav>

<div class="page" id="p-home"></div>
<div class="page" id="p-story"></div>
<div class="page" id="p-story-read"></div>
<div class="page" id="p-locations"></div>
<div class="page" id="p-loc-detail"></div>
<div class="page" id="p-quests"></div>
<div class="page" id="p-lore"></div>
<div class="page" id="p-lore-detail"></div>
<div class="page" id="p-party"></div>
<div class="page" id="p-party-detail"></div>

<footer><p>Saltmarsh · Azure Sea · Campaign Compendium</p></footer>

<script>
const SECTIONS = [
  {id:'story',     label:'Story',     icon:''},
  {id:'locations', label:'Locations', icon:''},
  {id:'quests',    label:'Quests',    icon:''},
  {id:'lore',      label:'Lore',      icon:''},
  {id:'party',     label:'Party',     icon:''},
];
const CAT_LABELS={tavern:'Tavern',civic:'Civic',trade:'Trade',docks:'Docks',landmark:'Landmark'};
const LOC_CATS=[{id:'all',l:'All'},{id:'tavern',l:'Taverns'},{id:'civic',l:'Civic'},{id:'trade',l:'Trade'},{id:'docks',l:'Docks'},{id:'landmark',l:'Landmarks'}];

let D=null,locFilter='all';

async function init(){
  try{const r=await fetch('data.json?v='+Date.now());D=await r.json()}
  catch(e){document.getElementById('p-home').innerHTML='<p class="empty-state">Could not load data.json.</p>';document.getElementById('p-home').classList.add('active');return}
  document.getElementById('nav-name').textContent=D.campaign.name;
  document.title=D.campaign.name;
  buildNav();route();
  window.addEventListener('hashchange',route);
}

function buildNav(){
  const w=document.getElementById('nav-links');
  SECTIONS.forEach(s=>{
    const a=document.createElement('div');a.className='nav-link';a.dataset.section=s.id;a.textContent=s.label;
    const counts={story:D.narratives.filter(n=>n.body).length,locations:D.locations.length,quests:D.quests.filter(q=>q.title).length,lore:D.lore.filter(l=>l.title).length,party:D.party.filter(p=>p.name).length};
    if(counts[s.id]){const c=document.createElement('span');c.className='nav-count';c.textContent=counts[s.id];a.appendChild(c)}
    a.onclick=()=>go(s.id);w.appendChild(a);
  });
}

function setActiveNav(section){
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.toggle('active',l.dataset.section===section));
}

function go(hash){window.location.hash=hash;window.scrollTo(0,0)}

function route(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const h=window.location.hash.replace('#','');
  const parts=h.split('/');const sec=parts[0]||'locations';const sub=parts[1]||null;

  setActiveNav(sec);

  switch(sec){
    case 'story':
      if(sub){renderStoryRead(sub);document.getElementById('p-story-read').classList.add('active')}
      else{renderStory();document.getElementById('p-story').classList.add('active')}
      break;
    case 'locations':
      if(sub){renderLocDetail(sub);document.getElementById('p-loc-detail').classList.add('active')}
      else{renderLocations();document.getElementById('p-locations').classList.add('active')}
      break;
    case 'quests':
      renderQuests();document.getElementById('p-quests').classList.add('active');break;
    case 'lore':
      if(sub){renderLoreDetail(sub);document.getElementById('p-lore-detail').classList.add('active')}
      else{renderLore();document.getElementById('p-lore').classList.add('active')}
      break;
    case 'party':
      if(sub){renderPartyDetail(sub);document.getElementById('p-party-detail').classList.add('active')}
      else{renderParty();document.getElementById('p-party').classList.add('active')}
      break;
    default:
      renderLocations();document.getElementById('p-locations').classList.add('active');setActiveNav('locations');
  }
  document.title=(sec?sec.charAt(0).toUpperCase()+sec.slice(1)+' — ':'')+D.campaign.name;
}

/* ═══ STORY ═══ */
function renderStory(){
  const el=document.getElementById('p-story');
  el.innerHTML=`<div class="page-title">Story</div><div class="page-sub">The narrative so far, chapter by chapter.</div><div class="chapter-list" id="ch-list"></div>`;
  const list=document.getElementById('ch-list');
  D.narratives.sort((a,b)=>a.order-b.order).forEach(n=>{
    const has=!!n.body;
    const c=document.createElement('div');
    c.className='chapter-card'+(has?' has-content':' empty');
    c.innerHTML=`<span class="ch-num">Ch. ${n.order}</span><span class="ch-title">${n.title}</span>${has?'<span class="ch-arrow">→</span>':''}`;
    if(has)c.onclick=()=>go('story/'+n.id);
    list.appendChild(c);
  });
}

function renderStoryRead(id){
  const n=D.narratives.find(x=>x.id===id);if(!n)return;
  const el=document.getElementById('p-story-read');
  const idx=D.narratives.findIndex(x=>x.id===id);
  const prev=D.narratives[idx-1],next=D.narratives[idx+1];
  el.innerHTML=`
    <div class="detail-back">
      <button class="back-btn" onclick="go('story')">← All Chapters</button>
      <div class="pn-row">
        <button class="pn-btn${prev?'':' off'}" onclick="${prev?`go('story/${prev.id}')`:''}" >← Prev</button>
        <button class="pn-btn${next?'':' off'}" onclick="${next?`go('story/${next.id}')`:''}" >Next →</button>
      </div>
    </div>
    <div class="reading">
      <div class="ch-num" style="text-align:center;margin-bottom:0.5rem">Chapter ${n.order}</div>
      <div class="reading-title">${n.title}</div>
      <div style="height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem 0 2rem"></div>
      ${n.body?`<div class="reading-body">${n.body}</div>`:'<div class="empty-state">Content coming soon.</div>'}
    </div>`;
}

/* ═══ LOCATIONS ═══ */
function renderLocations(){
  const el=document.getElementById('p-locations');
  el.innerHTML=`
    <div class="page-title">Saltmarsh — Locations</div>
    <div class="page-sub">Town guide. Locations with a <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);vertical-align:middle"></span> have detailed notes.</div>
    <div class="search-bar"><input type="text" id="loc-search" placeholder="Search locations, NPCs, notes…" oninput="filterLocs()"/></div>
    <div class="filter-row" id="loc-filters"></div>
    <div class="result-count" id="loc-count"></div>
    <div class="card-grid" id="loc-grid"></div>`;
  const fw=document.getElementById('loc-filters');
  LOC_CATS.forEach(c=>{
    const b=document.createElement('button');b.className='filter-btn'+(c.id===locFilter?' active':'');b.textContent=c.l;
    b.onclick=()=>{locFilter=c.id;document.querySelectorAll('#loc-filters .filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');filterLocs()};
    fw.appendChild(b);
  });
  filterLocs();
}

function filterLocs(){
  const q=(document.getElementById('loc-search')||{}).value||'';const ql=q.toLowerCase();
  const grid=document.getElementById('loc-grid');grid.innerHTML='';let n=0;
  D.locations.forEach((loc,i)=>{
    if(locFilter!=='all'&&loc.category!==locFilter)return;
    const str=[loc.name,loc.meta,loc.description,loc.notes||'',...(loc.npcs||[]),...(loc.tags||[])].join(' ').toLowerCase();
    if(ql&&!str.includes(ql))return;
    n++;
    const c=document.createElement('div');c.className='card';c.style.animationDelay=(n*0.025)+'s';
    const hasTags=loc.tags&&loc.tags.length,hasNotes=loc.notes&&loc.notes.trim();
    c.innerHTML=`<div class="card-inner">
      <div class="badge cat-${loc.category}">${loc.id}</div>
      <div style="flex:1;min-width:0">
        <div class="card-title">${loc.name}${hasNotes?'<span class="has-dot"></span>':''}</div>
        <div class="card-meta">${loc.meta}</div>
        <span class="cat-tag cat-${loc.category}">${CAT_LABELS[loc.category]||loc.category}</span>
        ${hasTags?`<div class="tags-row">${loc.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>`:''}
      </div><span class="card-arrow">→</span></div>`;
    c.onclick=()=>go('locations/'+loc.id);grid.appendChild(c);
  });
  document.getElementById('loc-count').textContent=n===D.locations.length?n+' locations':n+' of '+D.locations.length;
}

function renderLocDetail(sub){
  const id=parseInt(sub);const loc=D.locations.find(l=>l.id===id);if(!loc)return;
  const el=document.getElementById('p-loc-detail');
  const idx=D.locations.findIndex(l=>l.id===id);
  const prev=D.locations[idx-1],next=D.locations[idx+1];
  const hasNpcs=loc.npcs&&loc.npcs.length,hasNotes=loc.notes&&loc.notes.trim(),hasTags=loc.tags&&loc.tags.length;

  el.innerHTML=`
    <div class="detail-back">
      <button class="back-btn" onclick="go('locations')">← All Locations</button>
      <div class="pn-row">
        <button class="pn-btn${prev?'':' off'}" onclick="${prev?`go('locations/${prev.id}')`:''}" >← Prev</button>
        <button class="pn-btn${next?'':' off'}" onclick="${next?`go('locations/${next.id}')`:''}" >Next →</button>
      </div>
    </div>
    <div class="detail-hero">
      <div class="detail-badge cat-${loc.category}">${loc.id}</div>
      <div>
        <div class="detail-title">${loc.name}</div>
        <div class="detail-meta">${loc.meta}</div>
        <span class="cat-tag cat-${loc.category}" style="margin-top:8px;display:inline-block">${CAT_LABELS[loc.category]||loc.category}</span>
        ${hasTags?`<div class="tags-row" style="margin-top:8px">${loc.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>`:''}
      </div>
    </div>
    <div class="dsection"><div class="label label-gold">Overview</div><p class="desc-text">${loc.description||'<span class="empty-state" style="display:block;padding:1rem">No description yet.</span>'}</p></div>
    ${hasNpcs?`<div class="dsection"><div class="label label-gold">Notable People</div>${loc.npcs.map(n=>`<span class="npc-tag">${n}</span>`).join('')}</div>`:''}
    ${hasNotes?`<div class="dsection"><div class="label label-blue">Location Notes</div><div class="notes">${parseNotes(loc.notes)}</div></div>`:''}`;
  document.title=loc.name+' — '+D.campaign.name;
}

/* ═══ QUESTS ═══ */
function renderQuests(){
  const el=document.getElementById('p-quests');
  const active=D.quests.filter(q=>q.status==='active'&&q.title);
  const complete=D.quests.filter(q=>q.status==='complete'&&q.title);
  const empty=!active.length&&!complete.length;

  el.innerHTML=`<div class="page-title">Quests</div><div class="page-sub">Active and completed objectives.</div>`;
  if(empty){el.innerHTML+='<div class="empty-state">No quests logged yet. Drop quest content from Discord to populate this section.</div>';return}

  if(active.length){
    el.innerHTML+=`<div class="quest-section"><div class="label label-gold">Active</div>${active.map(q=>`
      <div class="quest-card"><div style="display:flex;align-items:center"><span class="quest-title">${q.title}</span><span class="quest-status status-active">Active</span></div>
      ${q.giver?`<div style="font-size:0.82rem;color:var(--parch-dim);margin-top:4px">From: ${q.giver}</div>`:''}
      ${q.reward?`<div style="font-size:0.82rem;color:var(--gold-light);margin-top:2px">Reward: ${q.reward}</div>`:''}
      ${q.body?`<div class="quest-body">${q.body}</div>`:''}</div>`).join('')}</div>`;
  }
  if(complete.length){
    el.innerHTML+=`<div class="quest-section"><div class="label label-gold">Complete</div>${complete.map(q=>`
      <div class="quest-card" style="opacity:0.55"><div style="display:flex;align-items:center"><span class="quest-title">${q.title}</span><span class="quest-status status-complete">Complete</span></div>
      ${q.body?`<div class="quest-body">${q.body}</div>`:''}</div>`).join('')}</div>`;
  }
}

/* ═══ LORE ═══ */
function renderLore(){
  const el=document.getElementById('p-lore');
  const cats=[{id:'history',l:'History'},{id:'religion',l:'Religion'},{id:'time',l:'Time & Calendar'}];
  const items=D.lore.filter(l=>l.title);
  el.innerHTML=`<div class="page-title">Lore</div><div class="page-sub">World history, religion, and the reckoning of time.</div>`;
  if(!items.length){el.innerHTML+='<div class="empty-state">No lore entries yet. Drop history, religion, or time content from Discord to populate this section.</div>';return}
  cats.forEach(cat=>{
    const entries=items.filter(l=>l.category===cat.id);if(!entries.length)return;
    el.innerHTML+=`<div style="margin-bottom:2rem"><div class="label label-gold">${cat.l}</div><div class="chapter-list">${entries.map(e=>`
      <div class="chapter-card has-content" onclick="go('lore/${e.id}')"><span class="ch-title">${e.title}</span><span class="ch-arrow">→</span></div>`).join('')}</div></div>`;
  });
}

function renderLoreDetail(id){
  const item=D.lore.find(l=>l.id===id);if(!item)return;
  const el=document.getElementById('p-lore-detail');
  el.innerHTML=`
    <div class="detail-back"><button class="back-btn" onclick="go('lore')">← Lore</button></div>
    <div class="reading">
      <div class="reading-title">${item.title}</div>
      <div style="height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem 0 2rem"></div>
      ${item.body?`<div class="reading-body">${item.body}</div>`:'<div class="empty-state">Content coming soon.</div>'}
    </div>`;
}

/* ═══ PARTY ═══ */
function renderParty(){
  const el=document.getElementById('p-party');
  el.innerHTML=`<div class="page-title">The Party</div><div class="page-sub">Adventurers of the Azure Sea.</div><div class="party-grid" id="party-grid"></div>`;
  const grid=document.getElementById('party-grid');
  D.party.forEach(pc=>{
    const has=!!pc.body;
    const c=document.createElement('div');c.className='pc-card'+(has?' has-content':' empty');
    c.innerHTML=`<div class="pc-initial">${pc.name.charAt(0)}</div><div class="pc-name">${pc.name}</div>${pc.player?`<div style="font-size:0.8rem;color:var(--parch-dim);margin-top:4px;font-style:italic">${pc.player}</div>`:''}`;
    if(has)c.onclick=()=>go('party/'+pc.id);
    grid.appendChild(c);
  });
}

function renderPartyDetail(id){
  const pc=D.party.find(p=>p.id===id);if(!pc)return;
  const el=document.getElementById('p-party-detail');
  el.innerHTML=`
    <div class="detail-back"><button class="back-btn" onclick="go('party')">← Party</button></div>
    <div class="detail-hero">
      <div class="pc-initial" style="width:48px;height:48px;font-size:1.1rem">${pc.name.charAt(0)}</div>
      <div><div class="detail-title">${pc.name}</div>${pc.player?`<div class="detail-meta">${pc.player}</div>`:''}</div>
    </div>
    ${pc.body?`<div class="dsection"><div class="label label-gold">Character Notes</div><div class="notes">${parseNotes(pc.body)}</div></div>`:'<div class="empty-state">No character notes yet.</div>'}`;
}

/* ═══ NOTES PARSER ═══ */
function parseNotes(raw){
  if(!raw)return'';
  const lines=raw.split('\n');let html='';let inP=false;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t){if(inP){html+='</div>';inP=false}return}
    if(/^──.+──$/.test(t)){if(inP){html+='</div>';inP=false}html+=`<span class="nh">${t.replace(/^──\s*/,'').replace(/\s*──$/,'')}</span>`;return}
    const di=t.indexOf(' — ');
    if(di>0&&/[\d+]/.test(t.slice(di))){
      if(!inP){html+='<div>';inP=true}
      html+=`<div class="pr"><span class="prn">${t.slice(0,di)}</span><span class="prv">${t.slice(di+3)}</span></div>`;return;
    }
    if(inP){html+='</div>';inP=false}
    if(/^\s{2,}/.test(line)){html+=`<div class="ni">${t}</div>`;return}
    html+=`<p>${t}</p>`;
  });
  if(inP)html+='</div>';
  return html;
}

init();
</script>
